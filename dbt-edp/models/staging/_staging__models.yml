version: 2

models:
  - name: stg_products
    description: "Staging layer for product data"
    columns:
      - name: product_id
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: product_name
        tests:
          - not_null
      - name: category
        tests:
          - not_null
      - name: unit_price
        tests:
          - not_null

  - name: stg_customers
    description: "Staging layer for customer data"
    columns:
      - name: customer_id
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: customer_name
        tests:
          - not_null
      - name: email
        tests:
          - unique
          - not_null
      - name: status
        tests:
          - accepted_values:
              values: ['ACTIVE', 'INACTIVE', 'PENDING']

  - name: stg_orders
    description: "Staging layer for order data"
    columns:
      - name: order_id
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Foreign key to customers"
        tests:
          - not_null
      - name: order_status
        tests:
          - accepted_values:
              values: ['PENDING', 'PROCESSING', 'COMPLETED', 'CANCELLED']
