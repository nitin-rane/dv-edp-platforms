version: 2

models:
  - name: dim_customers
    description: "Customer dimension with aggregated metrics and tiering"
    columns:
      - name: customer_id
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: customer_tier
        tests:
          - accepted_values:
              values: ['BRONZE', 'SILVER', 'GOLD', 'PLATINUM']

  - name: dim_products
    description: "Product dimension table"
    columns:
      - name: product_id
        description: "Primary key"
        tests:
          - unique
          - not_null

  - name: fct_orders
    description: "Fact table for orders"
    columns:
      - name: order_id
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null

  - name: agg_monthly_sales
    description: "Monthly sales aggregation for reporting"
    columns:
      - name: report_month
        description: "Month of report"
        tests:
          - not_null
      - name: total_revenue
        tests:
          - not_null
